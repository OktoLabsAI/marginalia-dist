name: distribution-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check shell scripts
        run: |
          set -euo pipefail
          bash -n install.sh test-install.sh
          shellcheck install.sh test-install.sh
          PRESEED_OUTPUT="$(mktemp)"
          if MARGINALIA_LLM_PROVIDER=skip bash install.sh >"$PRESEED_OUTPUT" 2>&1; then
            echo "installer accepted provider preseed without MARGINALIA_VAULT" >&2
            exit 1
          fi
          grep -Fq 'MARGINALIA_LLM_PROVIDER requires MARGINALIA_VAULT' "$PRESEED_OUTPUT"
          rm -f "$PRESEED_OUTPUT"
          ./test-install.sh --help | grep -F -- '--profile release-lifecycle'
          EVIDENCE=evidence/v0.0.40/linux-docker-tmux-release-lifecycle.txt
          EVIDENCE_SHA=6b72dc5c4c2dbefd03772492234b9cf3f73e092644ef29469aa8ae431792101f
          DRIVER_COMMIT=3764845c7f92cae13e6f2b3b289665a06696d921
          DRIVER_SHA=29cbedd70451d6e3a007c626a39f3827828617c3a09beb6e408ba060efe9ddfa
          INSTALL_SHA=55127f6a3ef35e7b0ae9bc0aeb506dc3c51b6695d9dfb759f73dd018b8870866
          MANIFEST_SHA=619d45919b506757442b758a4898e865e5600c7da12d8c83677bb3080414c5d8
          test "$(sha256sum "$EVIDENCE" | awk '{print $1}')" = "$EVIDENCE_SHA"
          grep -Fq "$EVIDENCE" README.md
          grep -Fq "$EVIDENCE_SHA" README.md
          grep -Fxq "DRIVER_COMMIT=$DRIVER_COMMIT" "$EVIDENCE"
          grep -Fxq \
            "DRIVER_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT/test-install.sh" \
            "$EVIDENCE"
          grep -Fxq "DRIVER_SHA256=$DRIVER_SHA" "$EVIDENCE"
          grep -Fxq \
            "INSTALL_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT/install.sh" \
            "$EVIDENCE"
          grep -Fxq "INSTALL_SHA256=$INSTALL_SHA" "$EVIDENCE"
          grep -Fxq \
            "MANIFEST_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT/release-manifest.json" \
            "$EVIDENCE"
          grep -Fxq "MANIFEST_SHA256=$MANIFEST_SHA" "$EVIDENCE"
          grep -Fq 'Pane is dead (status 0,' "$EVIDENCE"
          grep -Fq \
            'Authenticated Marginalia UI is ready at http://127.0.0.1:7777; browser launch skipped' \
            "$EVIDENCE"
          for marker in \
            RELEASE_LIFECYCLE_FRESH_INSTALL_OK \
            RELEASE_LIFECYCLE_STATUS_UI_OK \
            RELEASE_LIFECYCLE_STOPPED_UPDATE_OK \
            RELEASE_LIFECYCLE_RUNNING_UPDATE_OK \
            RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK \
            RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK \
            RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_OK \
            RELEASE_LIFECYCLE_ACTIVATION_ROLLBACK_OK \
            RELEASE_LIFECYCLE_FINAL_STOP_OK \
            DOCKER_TMUX_RELEASE_LIFECYCLE_OK
          do
            grep -Fq "$marker" test-install.sh
            test "$(grep -Fc "$marker" "$EVIDENCE")" -eq 1
          done
          grep -Fq 'RELEASE_LIFECYCLE_APP_FIRST_OK' test-install.sh
          for marker in \
            RELEASE_LIFECYCLE_PREDECESSOR_RUNNING_OK \
            RELEASE_LIFECYCLE_PREDECESSOR_ROLLBACK_OK \
            RELEASE_LIFECYCLE_PREDECESSOR_MIGRATION_OK
          do
            grep -Fq "$marker" test-install.sh
          done
          test "$(grep -Fc 'RELEASE_LIFECYCLE_PREDECESSOR_RUNNING_OK' test-install.sh)" -eq 2
          test "$(grep -Fc 'WINDOWS_RELEASE_LIFECYCLE_PREDECESSOR_STOPPED_UPDATE_OK' test-install.ps1)" -eq 1
          test "$(grep -Fc "sha256sum \"\$app_token_file\"" test-install.sh)" -eq 1
          grep -Fq 'marginalia ui --no-open' test-install.sh
          grep -Fq 'Marginalia UI is ready at' test-install.sh
          grep -Fq '.release-lifecycle-previous-tool-sentinel' test-install.sh
          grep -Fq "sha256sum \"\$rollback_sentinel\"" test-install.sh
          grep -Fq \
            'RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_SHA256=478c57d828b23e24c31834f8d49aeafa8822fac5421d4266670216f38d2222b5' \
            "$EVIDENCE"

          EVIDENCE_41=evidence/v0.0.41/linux-docker-tmux-release-lifecycle.txt
          EVIDENCE_SHA_41=ec2b9701e3ac3274a7f31e244ffeddc73537e7e434d59bda0d1c5e08d1ef5141
          DRIVER_COMMIT_41=93d23c4f2504f333bd2a89250afa84d1762f020b
          DRIVER_SHA_41=be3bda7471f73281115f11d0718fc4de50b4e142eab0771bbfa9263dd0f56400
          INSTALL_SHA_41=8c7db8c8ca52f298c46689fb830be81803f13cf9710737e886caf66f50b4c875
          MANIFEST_SHA_41=01e47fd5ffdf5f68abfd30834f6bc5ff7c448784bfa70bc175e44351ef8d62b2
          test "$(sha256sum "$EVIDENCE_41" | awk '{print $1}')" = "$EVIDENCE_SHA_41"
          test "$(wc -c < "$EVIDENCE_41" | tr -d ' ')" = 53651
          test "$(wc -l < "$EVIDENCE_41" | tr -d ' ')" = 1938
          grep -Fq "$EVIDENCE_41" README.md
          grep -Fq "$EVIDENCE_SHA_41" README.md
          grep -Fxq "DRIVER_COMMIT=$DRIVER_COMMIT_41" "$EVIDENCE_41"
          grep -Fxq \
            "DRIVER_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT_41/test-install.sh" \
            "$EVIDENCE_41"
          grep -Fxq "DRIVER_SHA256=$DRIVER_SHA_41" "$EVIDENCE_41"
          grep -Fxq \
            "INSTALL_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT_41/install.sh" \
            "$EVIDENCE_41"
          grep -Fxq "INSTALL_SHA256=$INSTALL_SHA_41" "$EVIDENCE_41"
          grep -Fxq \
            "MANIFEST_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT_41/release-manifest.json" \
            "$EVIDENCE_41"
          grep -Fxq "MANIFEST_SHA256=$MANIFEST_SHA_41" "$EVIDENCE_41"
          grep -Fxq \
            'PREDECESSOR_COMMIT=19847892b7e129225011d21d6d1f2ce00f996458' \
            "$EVIDENCE_41"
          grep -Fxq \
            'PREDECESSOR_INSTALL_SHA256=55127f6a3ef35e7b0ae9bc0aeb506dc3c51b6695d9dfb759f73dd018b8870866' \
            "$EVIDENCE_41"
          grep -Fxq \
            'PREDECESSOR_MANIFEST_SHA256=619d45919b506757442b758a4898e865e5600c7da12d8c83677bb3080414c5d8' \
            "$EVIDENCE_41"
          test "$(grep -Fc 'Pane is dead (status 0,' "$EVIDENCE_41")" -eq 1
          grep -Fq \
            'Marginalia UI is ready at http://127.0.0.1:7777/; browser launch skipped' \
            "$EVIDENCE_41"
          for marker in \
            RELEASE_LIFECYCLE_PREDECESSOR_RUNNING_OK \
            RELEASE_LIFECYCLE_PREDECESSOR_ROLLBACK_OK \
            RELEASE_LIFECYCLE_PREDECESSOR_MIGRATION_OK \
            RELEASE_LIFECYCLE_APP_FIRST_OK \
            RELEASE_LIFECYCLE_FRESH_INSTALL_OK \
            RELEASE_LIFECYCLE_STATUS_UI_OK \
            RELEASE_LIFECYCLE_STOPPED_UPDATE_OK \
            RELEASE_LIFECYCLE_RUNNING_UPDATE_OK \
            RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK \
            RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK \
            RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_OK \
            RELEASE_LIFECYCLE_ACTIVATION_ROLLBACK_OK \
            RELEASE_LIFECYCLE_FINAL_STOP_OK \
            DOCKER_TMUX_RELEASE_LIFECYCLE_OK
          do
            test "$(grep -Fc "$marker" "$EVIDENCE_41")" -eq 1
          done
          grep -Fq \
            'RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_SHA256=492606abe5ae609d9281a0b2314451062adbe6a408e5db62cf2e38e48fca94b5' \
            "$EVIDENCE_41"

          EVIDENCE_42=evidence/v0.0.42/linux-docker-tmux-release-lifecycle.txt
          EVIDENCE_SHA_42=936c6035cf7d8ac5ac7dc49d10ce747308b30fbb48423c31ec88da87934d4f62
          DRIVER_COMMIT_42=acf004529196ed5e6e2a5b533b8c00cf348eb960
          DRIVER_SHA_42=f04740e2172492dc28587065e7ecd3e854f59f84a3afcef7a84d577fbfdc60ba
          INSTALL_SHA_42=084c5396ad7b24b0c204b4223c4fd1f61f2827ec296fc967e57201213a17b53b
          MANIFEST_SHA_42=5a973f6b63418e72e051d96005221bfa1134a77d27b993fe84d474974cded968
          test "$(sha256sum "$EVIDENCE_42" | awk '{print $1}')" = "$EVIDENCE_SHA_42"
          test "$(wc -c < "$EVIDENCE_42" | tr -d ' ')" = 53650
          test "$(wc -l < "$EVIDENCE_42" | tr -d ' ')" = 1938
          grep -Fq "$EVIDENCE_42" README.md
          grep -Fq "$EVIDENCE_SHA_42" README.md
          grep -Fxq "DRIVER_COMMIT=$DRIVER_COMMIT_42" "$EVIDENCE_42"
          grep -Fxq \
            "DRIVER_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT_42/test-install.sh" \
            "$EVIDENCE_42"
          grep -Fxq "DRIVER_SHA256=$DRIVER_SHA_42" "$EVIDENCE_42"
          grep -Fxq \
            "INSTALL_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT_42/install.sh" \
            "$EVIDENCE_42"
          grep -Fxq "INSTALL_SHA256=$INSTALL_SHA_42" "$EVIDENCE_42"
          grep -Fxq \
            "MANIFEST_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT_42/release-manifest.json" \
            "$EVIDENCE_42"
          grep -Fxq "MANIFEST_SHA256=$MANIFEST_SHA_42" "$EVIDENCE_42"
          grep -Fxq \
            'PREDECESSOR_COMMIT=19847892b7e129225011d21d6d1f2ce00f996458' \
            "$EVIDENCE_42"
          grep -Fxq \
            'PREDECESSOR_INSTALL_SHA256=55127f6a3ef35e7b0ae9bc0aeb506dc3c51b6695d9dfb759f73dd018b8870866' \
            "$EVIDENCE_42"
          grep -Fxq \
            'PREDECESSOR_MANIFEST_SHA256=619d45919b506757442b758a4898e865e5600c7da12d8c83677bb3080414c5d8' \
            "$EVIDENCE_42"
          test "$(grep -Fc 'Pane is dead (status 0,' "$EVIDENCE_42")" -eq 1
          grep -Fq \
            'Marginalia UI is ready at http://127.0.0.1:7777/; browser launch skipped' \
            "$EVIDENCE_42"
          for marker in \
            RELEASE_LIFECYCLE_PREDECESSOR_RUNNING_OK \
            RELEASE_LIFECYCLE_PREDECESSOR_ROLLBACK_OK \
            RELEASE_LIFECYCLE_PREDECESSOR_MIGRATION_OK \
            RELEASE_LIFECYCLE_APP_FIRST_OK \
            RELEASE_LIFECYCLE_FRESH_INSTALL_OK \
            RELEASE_LIFECYCLE_STATUS_UI_OK \
            RELEASE_LIFECYCLE_STOPPED_UPDATE_OK \
            RELEASE_LIFECYCLE_RUNNING_UPDATE_OK \
            RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK \
            RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK \
            RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_OK \
            RELEASE_LIFECYCLE_ACTIVATION_ROLLBACK_OK \
            RELEASE_LIFECYCLE_FINAL_STOP_OK \
            DOCKER_TMUX_RELEASE_LIFECYCLE_OK
          do
            test "$(grep -Fc "$marker" "$EVIDENCE_42")" -eq 1
          done
          grep -Fq \
            'RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_SHA256=f90f3c91e5938d65a61c77548df4f0c5c9e90f78729977a5be4eb3b4933a27c4' \
            "$EVIDENCE_42"

      - name: Verify manifest, installers, docs, and public wheel
        run: |
          python3 - <<'PY'
          import email
          import hashlib
          import io
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          import zipfile
          from pathlib import Path

          def github_api(path):
              headers = {
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "marginalia-distribution-gate",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              request = urllib.request.Request(
                  f"https://api.github.com/{path}",
                  headers=headers,
              )
              with urllib.request.urlopen(request, timeout=60) as response:
                  return json.load(response)

          manifest = json.loads(Path("release-manifest.json").read_text())
          version = manifest["version"]
          url = manifest["wheel_url"]
          wheel = manifest["wheel"]
          assert re.fullmatch(r"\d+\.\d+\.\d+", version)
          assert wheel == f"marginalia-{version}-py3-none-any.whl"
          assert url.endswith(f"/v{version}/{wheel}")
          assert re.fullmatch(r"[0-9a-f]{64}", manifest["sha256"])
          assert re.fullmatch(r"[0-9a-f]{40}", manifest["source_commit"])

          # The source repository is private and org policy disables deploy keys.
          # Each direct source tag is operator-verified before the dist bake, then
          # pinned here so public Actions can enforce the exact source commit.
          operator_verified_source_commits = {
              "0.0.40": "302c56b23e29dfe1bbf79eeff5efc63c72b8d34f",
              "0.0.41": "aae59db84c2abd0e915ac4cb72c08e60209abe34",
              "0.0.42": "61c3347de7e5b859d23dcd0a7bee4b17dd162cfe",
          }
          assert version in operator_verified_source_commits, (
              f"v{version} has no operator-verified private source tag pin"
          )
          assert manifest["source_commit"] == operator_verified_source_commits[version], (
              "manifest.source_commit does not match the operator-verified private source tag"
          )

          try:
              dist_ref = github_api(
                  f"repos/OktoLabsAI/marginalia-dist/git/ref/tags/v{version}"
              )
          except urllib.error.HTTPError as error:
              raise AssertionError(
                  f"could not read public marginalia-dist tag v{version} "
                  f"via the GitHub API (HTTP {error.code})"
              ) from error
          assert dist_ref["ref"] == f"refs/tags/v{version}", (
              "the public distribution tag API returned a different ref"
          )
          tag_target = dist_ref["object"]
          while tag_target["type"] == "tag":
              tag_target = github_api(
                  f"repos/OktoLabsAI/marginalia-dist/git/tags/{tag_target['sha']}"
              )["object"]
          assert tag_target["type"] == "commit", (
              "the public distribution tag must ultimately resolve to a commit"
          )

          # Public Actions cannot discover private source history, but public dist
          # tags are independently resolvable. Pin each operator-verified atomic
          # driver after its tag is created; later evidence commits never move it.
          operator_verified_dist_tag_commits = {
              "0.0.40": "19847892b7e129225011d21d6d1f2ce00f996458",
              "0.0.41": "92bebfac1347d60a84281e3ca4692565fd954ffe",
              "0.0.42": "acf004529196ed5e6e2a5b533b8c00cf348eb960",
          }
          expected_dist_tag_commit = operator_verified_dist_tag_commits.get(version)
          current_evidence = Path(
              f"evidence/v{version}/linux-docker-tmux-release-lifecycle.txt"
          )
          if expected_dist_tag_commit is None and current_evidence.is_file():
              driver_commits = {
                  line.removeprefix("DRIVER_COMMIT=")
                  for line in current_evidence.read_text().splitlines()
                  if line.startswith("DRIVER_COMMIT=")
              }
              assert len(driver_commits) == 1, (
                  "current Linux evidence must name one exact atomic driver commit"
              )
              expected_dist_tag_commit = driver_commits.pop()
          if expected_dist_tag_commit is None:
              expected_dist_tag_commit = os.environ["GITHUB_SHA"]
          assert tag_target["sha"] == expected_dist_tag_commit, (
              "the public distribution tag does not resolve to the atomic driver commit"
          )

          try:
              release = github_api(
                  f"repos/OktoLabsAI/marginalia-dist/releases/tags/v{version}"
              )
          except urllib.error.HTTPError as error:
              raise AssertionError(
                  f"could not read public marginalia-dist prerelease v{version} "
                  f"via the GitHub API (HTTP {error.code})"
              ) from error
          assert release["tag_name"] == f"v{version}", (
              "the public release API returned a different tag"
          )
          assert release["draft"] is False, (
              "the distribution release must not be a draft"
          )
          assert release["prerelease"] is True, (
              "the distribution release must be a prerelease"
          )
          assert len(release["assets"]) == 1, (
              "the distribution prerelease must contain exactly one asset"
          )
          asset = release["assets"][0]
          assert asset["name"] == wheel, (
              "the release asset name does not match manifest.wheel"
          )
          assert asset["browser_download_url"] == url, (
              "the release asset URL does not match manifest.wheel_url"
          )
          assert asset["digest"] == f'sha256:{manifest["sha256"]}', (
              "the GitHub release asset digest does not match manifest.sha256"
          )

          shell = Path("install.sh").read_text()
          powershell = Path("install.ps1").read_text()
          shell_test = Path("test-install.sh").read_text()
          powershell_test = Path("test-install.ps1").read_text()
          readme = Path("README.md").read_text()
          manifest_url = (
              "https://raw.githubusercontent.com/OktoLabsAI/"
              "marginalia-dist/main/release-manifest.json"
          )

          assert f'MARGINALIA_DEFAULT_WHEEL_URL:-{url}' in shell
          assert f'MARGINALIA_DEFAULT_MANIFEST_URL:-{manifest_url}' in shell
          assert f'MARGINALIA_EXPECTED_VERSION:-{version}' in shell
          assert f'"{url}"' in powershell
          assert f'"{manifest_url}"' in powershell
          assert f'else {{ "{version}" }}' in powershell
          assert f'MARGINALIA_EXPECTED_VERSION:-{version}' in shell_test
          assert f'else {{ "{version}" }}' in powershell_test
          assert url in readme
          assert (
              "https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/"
              "$DistDriverSha/test-install.ps1"
          ) in readme
          assert (
              '& "$env:SystemRoot\\System32\\WindowsPowerShell\\v1.0\\powershell.exe" `\n'
              "  -NoProfile -ExecutionPolicy Bypass -File $Driver `\n"
              "  -Profile release-lifecycle -DriverCommit $DistDriverSha"
          ) in readme
          assert '"marginalia[' not in readme, "README must never resolve the unrelated PyPI project"
          assert "verified wheel SHA-256" in shell
          assert "restore_previous_tool" in shell
          assert "verified wheel SHA-256" in powershell
          assert "Restore-PreviousTool" in powershell
          assert not re.search(
              r"(?m)^\s*(?:(?:if|elif)\s+|!\s+)?claude\s+mcp\s+remove\b",
              shell,
          )
          assert not re.search(
              r"(?m)^\s*(?:&\s*)?claude\s+mcp\s+remove\b", powershell
          )
          assert "claude_mcp_registration_matches" in shell
          assert "Test-ClaudeMcpRegistrationMatches" in powershell
          assert "Find-DaemonLockRoot" in powershell
          assert "Find-VerifiedLegacyLockRoot" in powershell
          assert "Find-UnverifiedLiveLegacyDaemon" in powershell
          assert 'EXTRAS="serve,litellm"' in shell
          assert '$Extras = "serve,litellm"' in powershell
          assert 'DAEMON_PID_FILE="${DAEMON_RUNTIME_ROOT}/.marginalia/server.pid"' in shell
          assert 'DAEMON_TOKEN_FILE="${HOME_ROOT}/daemon-7777.token"' in shell
          assert '$DaemonPidFile = Join-Path $DaemonRuntimeRoot ".marginalia\\server.pid"' in powershell
          assert '$DaemonTokenFile = Join-Path $HomeRoot "daemon-7777.token"' in powershell
          assert "Assert-ValidPreseedInputs" in powershell
          assert "requires MARGINALIA_VAULT" in powershell
          assert 'SERVE_ARGS=(serve --daemon --no-open)' in shell
          assert 'SERVE_ARGS+=(--vault "${PREVIOUS_DAEMON_VAULT}")' in shell
          assert '$serveArgs = @("serve", "--daemon", "--no-open")' in powershell
          assert '$serveArgs += @("--vault", $script:PreviousDaemonVault)' in powershell
          assert '& $marginalia @serveArgs' in powershell
          assert 'STOP_COMMAND=("${STAGE_CLI}" stop --vault "${PREVIOUS_DAEMON_VAULT}" --timeout 30)' in shell
          assert '$stopArgs = @("stop", "--vault", $script:PreviousDaemonVault, "--timeout", "30")' in powershell
          assert 'serve --help 2>/dev/null | grep -q -- \'--no-open\'' in shell
          assert '$serveHelp -match \'(?m)--no-open\\b\'' in powershell
          assert "Authenticated Marginalia UI" not in shell_test
          assert "Authenticated Marginalia UI" not in powershell_test
          assert "Authorization: Bearer" not in shell_test
          assert "Authorization = \"Bearer" not in powershell_test
          linux_predecessor_markers = (
              "RELEASE_LIFECYCLE_PREDECESSOR_RUNNING_OK",
              "RELEASE_LIFECYCLE_PREDECESSOR_ROLLBACK_OK",
              "RELEASE_LIFECYCLE_PREDECESSOR_MIGRATION_OK",
          )
          linux_lifecycle_markers = linux_predecessor_markers + (
              "RELEASE_LIFECYCLE_APP_FIRST_OK",
              "RELEASE_LIFECYCLE_FRESH_INSTALL_OK",
              "RELEASE_LIFECYCLE_STATUS_UI_OK",
              "RELEASE_LIFECYCLE_STOPPED_UPDATE_OK",
              "RELEASE_LIFECYCLE_RUNNING_UPDATE_OK",
              "RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK",
              "RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK",
              "RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_SHA256=",
              "RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_OK",
              "RELEASE_LIFECYCLE_ACTIVATION_ROLLBACK_OK",
              "RELEASE_LIFECYCLE_FINAL_STOP_OK",
              "DOCKER_TMUX_RELEASE_LIFECYCLE_OK",
          )
          for marker in linux_lifecycle_markers:
              expected_count = 2 if marker in {
                  "RELEASE_LIFECYCLE_PREDECESSOR_RUNNING_OK",
                  "DOCKER_TMUX_RELEASE_LIFECYCLE_OK",
              } else 1
              assert shell_test.count(marker) == expected_count, marker
          linux_marker_positions = [shell_test.index(marker) for marker in linux_lifecycle_markers]
          assert linux_marker_positions == sorted(linux_marker_positions)
          windows_lifecycle_markers = (
              "WINDOWS_RELEASE_LIFECYCLE_PREDECESSOR_STOPPED_UPDATE_OK",
              "WINDOWS_RELEASE_LIFECYCLE_APP_FIRST_OK",
              "RELEASE_LIFECYCLE_FRESH_INSTALL_OK",
              "RELEASE_LIFECYCLE_STATUS_UI_OK",
              "RELEASE_LIFECYCLE_STOPPED_UPDATE_OK",
              "RELEASE_LIFECYCLE_RUNNING_UPDATE_OK",
              "RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK",
              "RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK",
