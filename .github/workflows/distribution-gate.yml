name: distribution-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          set -euo pipefail
          bash -n install.sh test-install.sh
          shellcheck install.sh test-install.sh
          ./test-install.sh --help | grep -F -- '--profile release-lifecycle'
          EVIDENCE=evidence/v0.0.40/linux-docker-tmux-release-lifecycle.txt
          EVIDENCE_SHA=6b72dc5c4c2dbefd03772492234b9cf3f73e092644ef29469aa8ae431792101f
          DRIVER_COMMIT=3764845c7f92cae13e6f2b3b289665a06696d921
          DRIVER_SHA=29cbedd70451d6e3a007c626a39f3827828617c3a09beb6e408ba060efe9ddfa
          INSTALL_SHA=55127f6a3ef35e7b0ae9bc0aeb506dc3c51b6695d9dfb759f73dd018b8870866
          MANIFEST_SHA=619d45919b506757442b758a4898e865e5600c7da12d8c83677bb3080414c5d8
          test "$(sha256sum "$EVIDENCE" | awk '{print $1}')" = "$EVIDENCE_SHA"
          grep -Fq "$EVIDENCE" README.md
          grep -Fq "$EVIDENCE_SHA" README.md
          grep -Fxq "DRIVER_COMMIT=$DRIVER_COMMIT" "$EVIDENCE"
          grep -Fxq \
            "DRIVER_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT/test-install.sh" \
            "$EVIDENCE"
          grep -Fxq "DRIVER_SHA256=$DRIVER_SHA" "$EVIDENCE"
          grep -Fxq \
            "INSTALL_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT/install.sh" \
            "$EVIDENCE"
          grep -Fxq "INSTALL_SHA256=$INSTALL_SHA" "$EVIDENCE"
          grep -Fxq \
            "MANIFEST_URL=https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/$DRIVER_COMMIT/release-manifest.json" \
            "$EVIDENCE"
          grep -Fxq "MANIFEST_SHA256=$MANIFEST_SHA" "$EVIDENCE"
          grep -Fq 'Pane is dead (status 0,' "$EVIDENCE"
          grep -Fq \
            'Authenticated Marginalia UI is ready at http://127.0.0.1:7777; browser launch skipped' \
            "$EVIDENCE"
          for marker in \
            RELEASE_LIFECYCLE_FRESH_INSTALL_OK \
            RELEASE_LIFECYCLE_STATUS_UI_OK \
            RELEASE_LIFECYCLE_STOPPED_UPDATE_OK \
            RELEASE_LIFECYCLE_RUNNING_UPDATE_OK \
            RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK \
            RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK \
            RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_OK \
            RELEASE_LIFECYCLE_ACTIVATION_ROLLBACK_OK \
            RELEASE_LIFECYCLE_FINAL_STOP_OK \
            DOCKER_TMUX_RELEASE_LIFECYCLE_OK
          do
            grep -Fq "$marker" test-install.sh
            test "$(grep -Fc "$marker" "$EVIDENCE")" -eq 1
          done
          grep -Fq 'marginalia ui --no-open' test-install.sh
          grep -Fq 'Authenticated Marginalia UI is ready at' test-install.sh
          grep -Fq '.release-lifecycle-previous-tool-sentinel' test-install.sh
          grep -Fq "sha256sum \"\$rollback_sentinel\"" test-install.sh
          grep -Fq \
            'RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_SHA256=478c57d828b23e24c31834f8d49aeafa8822fac5421d4266670216f38d2222b5' \
            "$EVIDENCE"

      - name: Verify manifest, installers, docs, and public wheel
        run: |
          python3 - <<'PY'
          import email
          import hashlib
          import io
          import json
          import re
          import urllib.request
          import zipfile
          from pathlib import Path

          manifest = json.loads(Path("release-manifest.json").read_text())
          version = manifest["version"]
          url = manifest["wheel_url"]
          wheel = manifest["wheel"]
          assert re.fullmatch(r"\d+\.\d+\.\d+", version)
          assert wheel == f"marginalia-{version}-py3-none-any.whl"
          assert url.endswith(f"/v{version}/{wheel}")
          assert re.fullmatch(r"[0-9a-f]{64}", manifest["sha256"])
          assert re.fullmatch(r"[0-9a-f]{40}", manifest["source_commit"])

          shell = Path("install.sh").read_text()
          powershell = Path("install.ps1").read_text()
          shell_test = Path("test-install.sh").read_text()
          powershell_test = Path("test-install.ps1").read_text()
          readme = Path("README.md").read_text()
          manifest_url = (
              "https://raw.githubusercontent.com/OktoLabsAI/"
              "marginalia-dist/main/release-manifest.json"
          )

          assert f'MARGINALIA_DEFAULT_WHEEL_URL:-{url}' in shell
          assert f'MARGINALIA_DEFAULT_MANIFEST_URL:-{manifest_url}' in shell
          assert f'MARGINALIA_EXPECTED_VERSION:-{version}' in shell
          assert f'"{url}"' in powershell
          assert f'"{manifest_url}"' in powershell
          assert f'else {{ "{version}" }}' in powershell
          assert f'MARGINALIA_EXPECTED_VERSION:-{version}' in shell_test
          assert f'else {{ "{version}" }}' in powershell_test
          assert url in readme
          assert (
              "https://raw.githubusercontent.com/OktoLabsAI/marginalia-dist/"
              "$DistDriverSha/test-install.ps1"
          ) in readme
          assert (
              '& "$env:SystemRoot\\System32\\WindowsPowerShell\\v1.0\\powershell.exe" `\n'
              "  -NoProfile -ExecutionPolicy Bypass -File $Driver `\n"
              "  -Profile release-lifecycle -DriverCommit $DistDriverSha"
          ) in readme
          assert '"marginalia[' not in readme, "README must never resolve the unrelated PyPI project"
          assert "verified wheel SHA-256" in shell
          assert "restore_previous_tool" in shell
          assert "verified wheel SHA-256" in powershell
          assert "Restore-PreviousTool" in powershell
          assert not re.search(
              r"(?m)^\s*(?:(?:if|elif)\s+|!\s+)?claude\s+mcp\s+remove\b",
              shell,
          )
          assert not re.search(
              r"(?m)^\s*(?:&\s*)?claude\s+mcp\s+remove\b", powershell
          )
          assert "claude_mcp_registration_matches" in shell
          assert "Test-ClaudeMcpRegistrationMatches" in powershell
          assert "Find-DaemonLockRoot" in powershell
          windows_lifecycle_markers = (
              "WINDOWS_RELEASE_LIFECYCLE_INTERACTIVE_ONBOARDING_OK",
              "RELEASE_LIFECYCLE_FRESH_INSTALL_OK",
              "RELEASE_LIFECYCLE_STATUS_UI_OK",
              "RELEASE_LIFECYCLE_STOPPED_UPDATE_OK",
              "RELEASE_LIFECYCLE_RUNNING_UPDATE_OK",
              "RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK",
              "RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK",
              "RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_SHA256=",
              "RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_OK",
              "RELEASE_LIFECYCLE_ACTIVATION_ROLLBACK_OK",
              "RELEASE_LIFECYCLE_FINAL_STOP_OK",
              "WINDOWS_RELEASE_LIFECYCLE_OK",
          )
          for marker in windows_lifecycle_markers:
              assert powershell_test.count(marker) == 1, marker
          marker_positions = [powershell_test.index(marker) for marker in windows_lifecycle_markers]
          assert marker_positions == sorted(marker_positions)
          powershell_sentinel_create = powershell_test.index(
              '-Value "previous-tool-only:$Version"'
          )
          assert powershell_sentinel_create < powershell_test.index(
              "RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK"
          )
          assert powershell_sentinel_create < powershell_test.index(
              "RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK"
          )
          assert powershell_test.count('-LiteralPath $rollbackSentinel') >= 4
          assert '"release-lifecycle"' in powershell_test
          assert ".release-lifecycle-previous-tool-sentinel" in powershell_test
          assert "RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_SHA256=" in powershell_test
          assert 'Invoke-ReleaseLifecycle $sandboxCli' in powershell_test
          assert 'if ($Profile -eq "skip")' in powershell_test
          assert 'if ($Profile -in @("skip", "release-lifecycle")) {' not in powershell_test
          assert '$env:UV_NO_MODIFY_PATH = "1"' in powershell_test
          assert '$env:UV_PYTHON_NO_REGISTRY = "1"' in powershell_test
          assert '$env:UV_PYTHON_INSTALL_REGISTRY = "0"' in powershell_test
          assert "UV_UNMANAGED_INSTALL" in powershell_test
          assert "MARGINALIA_PACKS" in powershell_test
          assert "MARGINALIA_MANIFEST = $ManifestUrl" in powershell_test
          assert "Initialize-TestSandbox" in powershell_test
          assert "Export-PublicEvidence" in powershell_test
          assert "requires Windows PowerShell 5.1 on Windows" in powershell_test
          assert "--driver-commit" in shell_test
          assert "DRIVER_COMMIT=" in shell_test
          assert "MARGINALIA_MANIFEST=\"$MANIFEST_URL\"" in shell_test
          assert "curl -fsS --config - http://127.0.0.1:7777/" in shell_test
          assert '-H "Authorization: Bearer $token"' not in shell_test
          assert "test_home_is_owned" in shell_test
          assert "refusing to delete test sandbox with invalid PID record" in shell_test
          assert "#{pane_dead}" in shell_test
          assert "tmux pane exited with status" in shell_test
          assert shell_test.count('wait_for_daemon_stopped "$fresh_pid" 7777 8201') == 2
          assert 'wait_for_daemon_stopped "$running_after" 7777 8201' in shell_test
          assert 'wait_for_daemon_stopped "$custom_pid" 7788 8202' in shell_test
          assert 'wait_for_daemon_stopped "$rollback_after" 7777 8201' in shell_test
          sentinel_create = shell_test.index(
              "printf 'previous-tool-only:%s\\n' \"$EXPECTED_VERSION\" > \"$rollback_sentinel\""
          )
          custom_refusal = shell_test.index("RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK")
          live_pid_refusal = shell_test.index("RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK")
          rollback_proof = shell_test.index("RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_OK")
          assert sentinel_create < custom_refusal < live_pid_refusal < rollback_proof
          assert shell_test.count(
              'sha256sum "$HOME/.marginalia/vaults/$VAULT/marginalia.yaml"'
          ) >= 5
          assert shell.index('if MCP_GET_OUTPUT="$(claude mcp get') < shell.index(
              "elif claude mcp add"
          )
          assert powershell.index("$mcpGetOutput = (& claude mcp get") < powershell.index(
              "& claude mcp add"
          )

          with urllib.request.urlopen(url, timeout=60) as response:
              data = response.read()
          assert hashlib.sha256(data).hexdigest() == manifest["sha256"]
          with zipfile.ZipFile(io.BytesIO(data)) as archive:
              metadata_name = next(
                  name for name in archive.namelist() if name.endswith(".dist-info/METADATA")
              )
              metadata = email.message_from_bytes(archive.read(metadata_name))
          assert metadata["Name"] == "marginalia"
          assert metadata["Version"] == version
          print(f"distribution parity verified for {wheel}")
          PY

  bash-transaction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Verify transaction helper failure paths
        run: |
          set -euo pipefail
          TEST_ROOT="$(mktemp -d)"
          LIVE_PID=""
          cleanup() {
            if [ -n "$LIVE_PID" ]; then
              kill "$LIVE_PID" >/dev/null 2>&1 || true
              wait "$LIVE_PID" 2>/dev/null || true
            fi
            rm -rf "$TEST_ROOT"
          }
          trap cleanup EXIT
          awk '/^trap installer_exit EXIT/{exit} {print}' install.sh > "$TEST_ROOT/helpers.sh"
          # shellcheck source=/dev/null
          source "$TEST_ROOT/helpers.sh"
          # State below is consumed by functions loaded from helpers.sh.
          # shellcheck disable=SC2034
          {
            VERIFY_PYTHON="$(command -v python3)"
            TOOL_ROOT="$TEST_ROOT/tools"
            TOOL_BIN="$TEST_ROOT/bin"
            ROLLBACK_VAULT="$TEST_ROOT/vault"
            PREVIOUS_VERSION="old-version"
            PREVIOUS_COMMAND="$TOOL_BIN/marginalia"
            WAS_RUNNING=1
            SHUTDOWN_REQUESTED=1
            ACTIVATION_STARTED=""
            OLD_PID=99999999
          }
          mkdir -p "$TOOL_BIN" "$ROLLBACK_VAULT/.marginalia"
          printf '%s\n' test-token > "$ROLLBACK_VAULT/.marginalia/daemon.token"
          cat > "$TOOL_BIN/marginalia" <<'SH'
          #!/bin/sh
          case "$1" in
            serve) : > "$RESTART_MARKER" ;;
            status) printf '%s\n' '{"marginalia_version":"old-version"}' ;;
          esac
          SH
          chmod +x "$TOOL_BIN/marginalia"
          export RESTART_MARKER="$TEST_ROOT/restarted"
          set +e
          (set +e; false; installer_exit) >"$TEST_ROOT/preactivation.out" 2>&1
          PREACTIVATION_RC=$?
          set -e
          test "$PREACTIVATION_RC" -ne 0
          test -f "$RESTART_MARKER"
          grep -Fq 'restored and restarted Marginalia old-version' \
            "$TEST_ROOT/preactivation.out"

          # State below is consumed by functions loaded from helpers.sh.
          # shellcheck disable=SC2034
          {
            BACKUP_ROOT="$TOOL_ROOT/.marginalia-installer-backup-test"
            WORK_TMP="$TEST_ROOT/work"
            PREVIOUS_VERSION="old-version"
            ACTIVATION_STARTED=1
            ACTIVATION_COMMITTED=""
            CANDIDATE_DAEMON_STARTED=1
            WAS_RUNNING=""
          }
          mkdir -p "$TOOL_ROOT/marginalia" "$BACKUP_ROOT/tool" \
            "$BACKUP_ROOT/bin" "$WORK_TMP"
          printf '%s\n' candidate > "$TOOL_ROOT/marginalia/marker"
          printf '%s\n' previous > "$BACKUP_ROOT/tool/marker"
          printf '#!/bin/sh\nexit 1\n' > "$TOOL_BIN/marginalia"
          chmod +x "$TOOL_BIN/marginalia"
          sleep 300 &
          LIVE_PID=$!
          printf '%s\n' "$LIVE_PID" > "$ROLLBACK_VAULT/.marginalia/server.pid"
          port_in_use() { return 1; }
          mcp_port_in_use() { return 1; }
          if (installer_exit) >"$TEST_ROOT/rollback.out" 2>&1; then
            echo "incomplete rollback unexpectedly succeeded" >&2
            exit 1
          fi
          test "$(cat "$TOOL_ROOT/marginalia/marker")" = candidate
          test "$(cat "$BACKUP_ROOT/tool/marker")" = previous
          grep -Fq 'candidate daemon is still live; refusing to remove its environment' \
            "$TEST_ROOT/rollback.out"
          grep -Fq "recovery backup retained at $BACKUP_ROOT" "$TEST_ROOT/rollback.out"

          CURL_ARGS="$TEST_ROOT/curl.args"
          CURL_STDIN="$TEST_ROOT/curl.stdin"
          curl() {
            printf '%s\n' "$@" > "$CURL_ARGS"
            cat > "$CURL_STDIN"
            printf '%s' '{"ok":true}'
          }
          SECRET='not-in-process-argv-123'
          test "$(authenticated_get "$SECRET" 'http://127.0.0.1:7777/version')" = \
            '{"ok":true}'
          if grep -Fq "$SECRET" "$CURL_ARGS"; then
            echo "authenticated curl leaked its token into process arguments" >&2
            exit 1
          fi
          grep -Fq "Authorization: Bearer $SECRET" "$CURL_STDIN"

          MCP_URL='http://127.0.0.1:8201/mcp'
          CONNECTED_USER="$(printf '%s\n' \
            'Scope: User config' \
            'Status: Connected' \
            'Type: http' \
            "URL: $MCP_URL")"
          LOCAL_FAILED="$(printf '%s\n' \
            'Scope: Local config' \
            'Status: Failed to connect' \
            'Type: http' \
            "URL: $MCP_URL")"
          NOT_CONNECTED="$(printf '%s\n' \
            'Scope: User config' \
            'Status: Not Connected' \
            'Type: http' \
            "URL: $MCP_URL")"
          SCOPE_SUFFIX="$(printf '%s\n' \
            'Scope: User config unexpected' \
            'Status: Connected' \
            'Type: http' \
            "URL: $MCP_URL")"
          TYPE_SUFFIX="$(printf '%s\n' \
            'Scope: User config' \
            'Status: Connected' \
            'Type: http unexpected' \
            "URL: $MCP_URL")"
          URL_SUFFIX="$(printf '%s\n' \
            'Scope: User config' \
            'Status: Connected' \
            'Type: http' \
            "URL: $MCP_URL unexpected")"
          DUPLICATE_SCOPE="$(printf '%s\n%s\n' \
            "$CONNECTED_USER" 'Scope: Local config')"
          DUPLICATE_STATUS="$(printf '%s\n%s\n' \
            "$CONNECTED_USER" 'Status: Not Connected')"
          DUPLICATE_TYPE="$(printf '%s\n%s\n' \
            "$CONNECTED_USER" 'Type: stdio')"
          DUPLICATE_URL="$(printf '%s\n%s\n' \
            "$CONNECTED_USER" 'URL: http://127.0.0.1:9999/mcp')"
          claude_mcp_registration_matches "$CONNECTED_USER" "$MCP_URL"
          for invalid in \
            "$LOCAL_FAILED" \
            "$NOT_CONNECTED" \
            "$SCOPE_SUFFIX" \
            "$TYPE_SUFFIX" \
            "$URL_SUFFIX" \
            "$DUPLICATE_SCOPE" \
            "$DUPLICATE_STATUS" \
            "$DUPLICATE_TYPE" \
            "$DUPLICATE_URL"
          do
            if claude_mcp_registration_matches "$invalid" "$MCP_URL"; then
              echo "non-exact MCP registration was accepted" >&2
              exit 1
            fi
          done
          test "$(claude_mcp_registration_scope "$LOCAL_FAILED")" = local
          test "$(claude_mcp_registration_scope "$SCOPE_SUFFIX")" = unknown

          python3 - <<'PY'
          from pathlib import Path

          source = Path("install.sh").read_text()
          status = source.index('STATUS_JSON="$(discover_daemon_status)"')
          armed = source.index('SHUTDOWN_REQUESTED="1"', status)
          stop = source.index('"${STAGE_CLI}" stop --vault "${OLD_LOCK_ROOT}"', armed)
          activation = source.index('ACTIVATION_STARTED="1"', status)
          assert status < armed < stop < activation
          PY

      - name: Verify checksum rejection and activation rollback
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/marginalia-transaction-home"
          export UV_TOOL_DIR="$RUNNER_TEMP/marginalia-transaction-tools"
          export UV_TOOL_BIN_DIR="$RUNNER_TEMP/marginalia-transaction-bin"
          export UV_CACHE_DIR="$RUNNER_TEMP/uv-cache"
          export MARGINALIA_MANIFEST="$GITHUB_WORKSPACE/release-manifest.json"
          export MARGINALIA_ONBOARD_NONINTERACTIVE=1
          export MARGINALIA_LLM_PROVIDER=skip
          export MARGINALIA_NO_SERVE=1
          export MARGINALIA_NO_MCP=1
          export MARGINALIA_NO_UPDATE_SHELL=1
          mkdir -p "$HOME"

          bash install.sh >/dev/null
          TOOL_PYTHON="$UV_TOOL_DIR/marginalia/bin/python"
          BEFORE_VERSION="$("$TOOL_PYTHON" -c 'import importlib.metadata; print(importlib.metadata.version("marginalia"))')"
          BEFORE_CONFIG_SHA="$(sha256sum "$HOME/.marginalia/vaults/mynotes/marginalia.yaml" | awk '{print $1}')"

          GUARD_VAULT="$HOME/.marginalia/vaults/custom-port"
          GUARD_PID_FILE="$GUARD_VAULT/.marginalia/server.pid"
          GUARD_OUTPUT="$RUNNER_TEMP/marginalia-live-pid-guard.out"
          mkdir -p "$(dirname "$GUARD_PID_FILE")"
          sleep 300 &
          GUARD_PID=$!
          trap 'kill "$GUARD_PID" >/dev/null 2>&1 || true' EXIT
          printf '%s\n' "$GUARD_PID" > "$GUARD_PID_FILE"
          if bash install.sh >"$GUARD_OUTPUT" 2>&1; then
            echo "installer replaced the tool despite an unverified live PID record" >&2
            exit 1
          fi
          grep -F "live Marginalia daemon (pid $GUARD_PID)" "$GUARD_OUTPUT"
          grep -F "marginalia stop --vault $GUARD_VAULT" "$GUARD_OUTPUT"
          kill -0 "$GUARD_PID"
          test "$("$TOOL_PYTHON" -c 'import importlib.metadata; print(importlib.metadata.version("marginalia"))')" = "$BEFORE_VERSION"
          kill "$GUARD_PID"
          wait "$GUARD_PID" 2>/dev/null || true
          trap - EXIT
          rm -f "$GUARD_PID_FILE"

          BAD_SHA="$(printf '0%.0s' {1..64})"
          if MARGINALIA_WHEEL_SHA256="$BAD_SHA" bash install.sh >/dev/null 2>&1; then
            echo "installer accepted a checksum that conflicts with the manifest" >&2
            exit 1
          fi
          test "$("$TOOL_PYTHON" -c 'import importlib.metadata; print(importlib.metadata.version("marginalia"))')" = "$BEFORE_VERSION"

          REAL_UV="$(command -v uv)"
          uv() {
            if [ "${FAIL_UV_TOOL_INSTALL:-}" = 1 ] \
               && [ "${1:-}" = tool ] && [ "${2:-}" = install ]; then
              return 77
            fi
            "$REAL_UV" "$@"
          }
          export -f uv
          export REAL_UV
          if FAIL_UV_TOOL_INSTALL=1 bash install.sh >/dev/null 2>&1; then
            echo "forced activation failure unexpectedly succeeded" >&2
            exit 1
          fi

          test "$("$TOOL_PYTHON" -c 'import importlib.metadata; print(importlib.metadata.version("marginalia"))')" = "$BEFORE_VERSION"
          test -x "$UV_TOOL_BIN_DIR/marginalia"
          test "$(sha256sum "$HOME/.marginalia/vaults/mynotes/marginalia.yaml" | awk '{print $1}')" = "$BEFORE_CONFIG_SHA"
          test -z "$(find "$UV_TOOL_DIR" -maxdepth 1 -name '.marginalia-installer-backup-*' -print -quit)"
          printf 'checksum rejection and rollback verified for %s\n' "$BEFORE_VERSION"

  powershell-syntax:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        shell: powershell
        run: |
          $failed = $false
          foreach ($path in @("install.ps1", "test-install.ps1")) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Join-Path $PWD $path),
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-Host
              $failed = $true
            }
          }

          $tester = Get-Content -Raw -LiteralPath "test-install.ps1"
          $childMatch = [regex]::Match(
            $tester,
            '(?s)\$child = @''\r?\n(?<child>.*?)\r?\n''@'
          )
          if (-not $childMatch.Success) {
            throw "test-install.ps1 child runner here-string was not found"
          }
          $childTokens = $null
          $childErrors = $null
          $childAst = [System.Management.Automation.Language.Parser]::ParseInput(
            $childMatch.Groups["child"].Value,
            [ref]$childTokens,
            [ref]$childErrors
          )
          if ($childErrors.Count -gt 0) {
            $childErrors | Format-List | Out-Host
            throw "generated Windows child runner did not parse"
          }
          $lifecycleAst = $childAst.Find(
            {
              param($node)
              $node -is [System.Management.Automation.Language.FunctionDefinitionAst] -and
                $node.Name -eq "Invoke-ReleaseLifecycle"
            },
            $true
          )
          if ($null -eq $lifecycleAst) {
            throw "generated Windows child runner has no Invoke-ReleaseLifecycle function"
          }
          $previousMarkerIndex = -1
          foreach ($marker in @(
            "WINDOWS_RELEASE_LIFECYCLE_INTERACTIVE_ONBOARDING_OK",
            "RELEASE_LIFECYCLE_FRESH_INSTALL_OK",
            "RELEASE_LIFECYCLE_STATUS_UI_OK",
            "RELEASE_LIFECYCLE_STOPPED_UPDATE_OK",
            "RELEASE_LIFECYCLE_RUNNING_UPDATE_OK",
            "RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK",
            "RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK",
            "RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_SHA256=",
            "RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_OK",
            "RELEASE_LIFECYCLE_ACTIVATION_ROLLBACK_OK",
            "RELEASE_LIFECYCLE_FINAL_STOP_OK",
            "WINDOWS_RELEASE_LIFECYCLE_OK"
          )) {
            $matches = [regex]::Matches($tester, [regex]::Escape($marker))
            if ($matches.Count -ne 1) {
              throw "Windows lifecycle marker is missing or duplicated: $marker"
            }
            if ($matches[0].Index -le $previousMarkerIndex) {
              throw "Windows lifecycle markers are out of order at: $marker"
            }
            $previousMarkerIndex = $matches[0].Index
          }
          foreach ($required in @(
            '.release-lifecycle-previous-tool-sentinel',
            'RELEASE_LIFECYCLE_PREVIOUS_TOOL_SENTINEL_SHA256=',
            '$Profile -in @("interactive", "release-lifecycle")',
            'if ($Profile -eq "skip")',
            '$env:UV_NO_MODIFY_PATH = "1"',
            '$env:UV_PYTHON_NO_REGISTRY = "1"',
            '$env:UV_PYTHON_INSTALL_REGISTRY = "0"',
            '$env:UV_INSTALL_DIR = Join-Path $TestHome ".uv\bin"',
            '$env:UV_PYTHON_BIN_DIR = Join-Path $TestHome ".uv\python-bin"',
            '$env:UV_PYTHON_CACHE_DIR = Join-Path $TestHome ".uv\python-cache"',
            '$env:XDG_BIN_HOME = Join-Path $TestHome ".local\bin"',
            '$env:MARGINALIA_MANIFEST = $ManifestUrl',
            '$env:MARGINALIA_PACKS = "core,research,personal"',
            'Export-PublicEvidence',
            'Initialize-TestSandbox',
            'Invoke-ReleaseLifecycle $sandboxCli'
          )) {
            if (-not $tester.Contains($required)) {
              throw "Windows release lifecycle contract is missing: $required"
            }
          }
          $sentinelCreateIndex = $tester.IndexOf('-Value "previous-tool-only:$Version"')
          $customRefusalIndex = $tester.IndexOf('RELEASE_LIFECYCLE_CUSTOM_PORT_REFUSAL_OK')
          $livePidRefusalIndex = $tester.IndexOf('RELEASE_LIFECYCLE_LIVE_PID_REFUSAL_OK')
          $sentinelPathChecks = [regex]::Matches(
            $tester,
            [regex]::Escape('-LiteralPath $rollbackSentinel')
          ).Count
          if ($sentinelCreateIndex -lt 0 -or
              $sentinelCreateIndex -ge $customRefusalIndex -or
              $sentinelCreateIndex -ge $livePidRefusalIndex -or
              $sentinelPathChecks -lt 4) {
            throw "Windows same-version refusal sentinel contract is incomplete"
          }
          if ($failed) { throw "PowerShell syntax validation failed" }

      - name: Verify Claude MCP registration parsing
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile(
            (Join-Path $PWD "install.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) { throw "install.ps1 did not parse" }

          foreach ($functionName in @(
            "Test-ClaudeMcpRegistrationMatches",
            "Get-ClaudeMcpRegistrationScope"
          )) {
            $functionAst = $ast.Find(
              {
                param($node)
                $node -is [System.Management.Automation.Language.FunctionDefinitionAst] -and
                  $node.Name -eq $functionName
              },
              $true
            )
            if ($null -eq $functionAst) { throw "$functionName is missing" }
            . ([scriptblock]::Create($functionAst.Extent.Text))
          }

          $expectedUrl = "http://127.0.0.1:8201/mcp"
          $connectedUser = @(
            "Scope: User config",
            "Status: Connected",
            "Type: http",
            "URL: $expectedUrl"
          ) -join "`n"
          if (-not (Test-ClaudeMcpRegistrationMatches $connectedUser $expectedUrl)) {
            throw "connected user-scope registration was rejected"
          }
          $decoratedConnectedUser = @(
            "Scope: User config (available in all your projects)",
            ("Status: {0} Connected" -f [char]0x2713),
            "Type: http",
            "URL: $expectedUrl"
          ) -join "`n"
          if (-not (Test-ClaudeMcpRegistrationMatches $decoratedConnectedUser $expectedUrl)) {
            throw "decorated connected user-scope registration was rejected"
          }

          $invalidRegistrations = @(
            (@(
              "Scope: Local config",
              "Status: Failed to connect",
              "Type: http",
              "URL: $expectedUrl"
            ) -join "`n"),
            (@(
              "Scope: Project config",
              "Status: Connected",
              "Type: http",
              "URL: $expectedUrl"
            ) -join "`n"),
            (@(
              "Scope: User config",
              "Status: Not Connected",
              "Type: http",
              "URL: $expectedUrl"
            ) -join "`n"),
            (@(
              "Scope: User config",
              "Status: Connected",
              "Type: stdio",
              "URL: $expectedUrl"
            ) -join "`n"),
            (@(
              "Scope: User config",
              "Status: Connected",
              "Type: http",
              "URL: http://127.0.0.1:9999/mcp"
            ) -join "`n"),
            (@(
              "Scope: User config unexpected",
              "Status: Connected",
              "Type: http",
              "URL: $expectedUrl"
            ) -join "`n"),
            (@(
              "Scope: User config",
              "Status: Connected",
              "Type: http",
              "URL: $expectedUrl unexpected"
            ) -join "`n"),
            "$connectedUser`nScope: Local config",
            "$connectedUser`nStatus: Not Connected",
            "$connectedUser`nType: stdio",
            "$connectedUser`nURL: http://127.0.0.1:9999/mcp",
            (@(
              "Scope: user config",
              "Status: Connected",
              "Type: http",
              "URL: $expectedUrl"
            ) -join "`n"),
            (@(
              "Scope: User config",
              "Status: connected",
              "Type: http",
              "URL: $expectedUrl"
            ) -join "`n"),
            (@(
              "Scope: User config",
              "Status: Connected",
              "Type: HTTP",
              "URL: $expectedUrl"
            ) -join "`n"),
            (@(
              "Scope: User config",
              "Status: Connected",
              "Type: http",
              "URL: http://127.0.0.1:8201/MCP"
            ) -join "`n")
          )
          foreach ($registration in $invalidRegistrations) {
            if (Test-ClaudeMcpRegistrationMatches $registration $expectedUrl) {
              throw "invalid registration was accepted: $registration"
            }
          }
          if ((Get-ClaudeMcpRegistrationScope $invalidRegistrations[0]) -ne "local") {
            throw "local registration scope was not identified"
          }
          if ((Get-ClaudeMcpRegistrationScope $invalidRegistrations[1]) -ne "project") {
            throw "project registration scope was not identified"
          }
          if ((Get-ClaudeMcpRegistrationScope $invalidRegistrations[5]) -ne "unknown") {
            throw "malformed registration scope was identified as user scope"
          }
          if ((Get-ClaudeMcpRegistrationScope $invalidRegistrations[11]) -ne "unknown") {
            throw "case-variant registration scope was identified as user scope"
          }

          $source = Get-Content -Raw -LiteralPath "install.ps1"
          $removeCommand = $ast.Find(
            {
              param($node)
              $node -is [System.Management.Automation.Language.CommandAst] -and
                $node.GetCommandName() -eq "claude" -and
                $node.Extent.Text -match '(?i)claude\s+mcp\s+remove\b'
            },
            $true
          )
          if ($null -ne $removeCommand) {
            throw "installer must not remove an existing MCP registration automatically"
          }
          $addIndex = $source.IndexOf('& claude mcp add --scope user')
          $postAddRead = $source.IndexOf('$mcpGetOutput = (& claude mcp get marginalia', $addIndex)
          $postAddVerify = $source.IndexOf('Test-ClaudeMcpRegistrationMatches $mcpGetOutput $globalUrl', $postAddRead)
          if ($addIndex -lt 0 -or $postAddRead -le $addIndex -or
              $postAddVerify -le $postAddRead) {
            throw "fresh MCP registration must be read back and verified"
          }
          foreach ($required in @(
            'claude mcp remove marginalia --scope $mcpScope',
            'Claude MCP registration conflict; resolve the existing entry and re-run this installer'
          )) {
            if (-not $source.Contains($required)) {
              throw "MCP conflict guidance is missing: $required"
            }
          }

      - name: Verify fail-closed PID record guard
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile(
            (Join-Path $PWD "install.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) { throw "install.ps1 did not parse" }

          foreach ($functionName in @(
            "Test-ProcessAlive",
            "Read-ServerProcessId",
            "Find-DaemonLockRoot",
            "Assert-NoUndiscoveredLiveDaemon"
          )) {
            $functionAst = $ast.Find(
              {
                param($node)
                $node -is [System.Management.Automation.Language.FunctionDefinitionAst] -and
                  $node.Name -eq $functionName
              },
              $true
            )
            if ($null -eq $functionAst) { throw "$functionName is missing" }
            . ([scriptblock]::Create($functionAst.Extent.Text))
          }

          $temp = Join-Path $env:RUNNER_TEMP "marginalia-server.pid"
          try {
            Set-Content -LiteralPath $temp -Value "4242" -Encoding ASCII
            if ((Read-ServerProcessId $temp) -ne 4242) {
              throw "legacy integer PID record was not parsed"
            }
            Set-Content -LiteralPath $temp -Value '{"version":1,"pid":4343,"start_token":"test","owner_id":"test"}' -Encoding ASCII
            if ((Read-ServerProcessId $temp) -ne 4343) {
              throw "JSON PID record was not parsed"
            }
            Set-Content -LiteralPath $temp -Value '{"pid":"invalid"}' -Encoding ASCII
            if ((Read-ServerProcessId $temp) -ne 0) {
              throw "invalid PID record did not fail closed"
            }
            Set-Content -LiteralPath $temp -Value ("1" * 16385) -Encoding ASCII
            if ((Read-ServerProcessId $temp) -ne 0) {
              throw "oversized PID record did not fail closed"
            }
          } finally {
            Remove-Item -LiteralPath $temp -Force -ErrorAction SilentlyContinue
          }

          $HomeRoot = Join-Path $env:RUNNER_TEMP "marginalia-pid-guard-home"
          $RestUrl = "http://127.0.0.1:7777"
          $vaultPath = Join-Path $HomeRoot "vaults\custom-port-vault"
          $recordPath = Join-Path $vaultPath ".marginalia\server.pid"
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $recordPath) | Out-Null
          Set-Content -LiteralPath $recordPath -Value ("{`"version`":1,`"pid`":$PID}") -Encoding ASCII
          $lockRoot = Find-DaemonLockRoot $PID $vaultPath
          if ($lockRoot -ne $vaultPath) {
            throw "authenticated PID did not resolve to its lifecycle lock root: $lockRoot"
          }
          if (Find-DaemonLockRoot ($PID + 1) $vaultPath) {
            throw "a mismatched PID was accepted as the lifecycle lock owner"
          }
          function Die([string]$Message) { throw $Message }
          function Get-MarginaliaCommand { return $null }
          $guardError = ""
          try {
            Assert-NoUndiscoveredLiveDaemon
          } catch {
            $guardError = $_.Exception.Message
          } finally {
            Remove-Item -LiteralPath $HomeRoot -Recurse -Force -ErrorAction SilentlyContinue
          }
          $expectedStop = "marginalia stop --vault `"$vaultPath`""
          if (-not $guardError.Contains($expectedStop)) {
            throw "live PID guard did not provide exact quoted stop guidance: $guardError"
          }
          if (-not $guardError.Contains("Custom endpoint/ports may require manual stop.")) {
            throw "live PID guard did not provide custom-port guidance: $guardError"
          }

          $source = Get-Content -Raw -LiteralPath "install.ps1"
          $statusIndex = $source.IndexOf('$status = Get-AuthenticatedStatus')
          $guardIndex = $source.IndexOf('Assert-NoUndiscoveredLiveDaemon', $statusIndex)
          $activationIndex = $source.IndexOf('Step "Activating staged Marginalia', $statusIndex)
          if ($statusIndex -lt 0 -or $guardIndex -le $statusIndex -or $activationIndex -le $guardIndex) {
            throw "live PID guard must run after status discovery and before activation"
          }
          if (-not $source.Contains('marginalia stop --vault `"$vaultPath`"')) {
            throw "live PID guard is missing the exact quoted stop guidance"
          }
          if (-not $source.Contains('Custom endpoint/ports may require manual stop.')) {
            throw "live PID guard is missing custom-port guidance"
          }

      - name: Verify Windows transaction and sandbox contracts
        shell: powershell
        run: |
          $install = Get-Content -Raw -LiteralPath "install.ps1"
          $statusIndex = $install.IndexOf('$status = Get-AuthenticatedStatus')
          $lockRootIndex = $install.IndexOf('$oldLockRoot = Find-DaemonLockRoot', $statusIndex)
          $previousPidIndex = $install.IndexOf('$script:PreviousProcessId = $oldPid', $lockRootIndex)
          $preStopArmIndex = $install.IndexOf('$script:TransactionArmed = $true', $previousPidIndex)
          $oldStopIndex = $install.IndexOf('& $stageCli stop --vault $oldLockRoot --timeout 30', $previousPidIndex)
          $activationIndex = $install.IndexOf('Step "Activating staged Marginalia', $oldStopIndex)
          if ($statusIndex -lt 0 -or $lockRootIndex -le $statusIndex -or
              $previousPidIndex -le $lockRootIndex -or
              $preStopArmIndex -le $previousPidIndex -or
              $oldStopIndex -le $preStopArmIndex -or
              $activationIndex -le $oldStopIndex) {
            throw "PID lock ownership and rollback must be established before staged shutdown"
          }
          foreach ($required in @(
            'authenticated daemon status reported pid $oldPid, but its lifecycle lock could not be found',
            'Stop it first: marginalia stop --vault `"$oldLockRoot`"',
            'could not stop the verified daemon (pid $oldPid)'
          )) {
            if (-not $install.Contains($required)) {
              throw "Windows lifecycle ownership contract is missing: $required"
            }
          }

          $restoreIndex = $install.IndexOf('function Restore-PreviousTool')
          $candidateStopIndex = $install.IndexOf('Stop-CandidateDaemonForRollback', $restoreIndex)
          $candidateDeleteIndex = $install.IndexOf('Remove-Item -LiteralPath $activeTool', $restoreIndex)
          if ($restoreIndex -lt 0 -or $candidateStopIndex -le $restoreIndex -or
              $candidateDeleteIndex -le $candidateStopIndex) {
            throw "candidate shutdown verification must precede environment deletion"
          }
          foreach ($required in @(
            'is still live after graceful shutdown; active environment and backup retained',
            'previous Marginalia daemon remains running (pid $($script:PreviousProcessId))',
            'Remove-InstallerTemps -KeepBackup:$keepBackup',
            'rollback incomplete; previous tool backup retained'
          )) {
            if (-not $install.Contains($required)) {
              throw "Windows rollback contract is missing: $required"
            }
          }

          $tokens = $null
          $errors = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile(
            (Join-Path $PWD "install.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          $restoreDaemonAst = $ast.Find(
            {
              param($node)
              $node -is [System.Management.Automation.Language.FunctionDefinitionAst] -and
                $node.Name -eq "Restore-PreviousDaemonState"
            },
            $true
          )
          if ($null -eq $restoreDaemonAst) { throw "Restore-PreviousDaemonState is missing" }
          . ([scriptblock]::Create($restoreDaemonAst.Extent.Text))
          function Test-ProcessAlive([int]$ProcessId) { return $true }
          function Info([string]$Message) { $script:RestoreInfo = $Message }
          $script:WasRunning = $true
          $script:RollbackVault = "test-vault"
          $script:ActivationStarted = $false
          $script:PreviousProcessId = 4242
          $script:PreviousStopRequested = $true
          $script:RestoreInfo = ""
          Restore-PreviousDaemonState
          if ($script:PreviousStopRequested -or
              $script:RestoreInfo -ne "previous Marginalia daemon remains running (pid 4242)") {
            throw "pre-activation rollback did not preserve the unchanged daemon"
          }

          $cleanupAst = $ast.Find(
            {
              param($node)
              $node -is [System.Management.Automation.Language.FunctionDefinitionAst] -and
                $node.Name -eq "Remove-InstallerTemps"
            },
            $true
          )
          if ($null -eq $cleanupAst) { throw "Remove-InstallerTemps is missing" }
          . ([scriptblock]::Create($cleanupAst.Extent.Text))
          function Warn([string]$Message) {}

          $transactionRoot = Join-Path $env:RUNNER_TEMP "marginalia-transaction-retention"
          $script:BackupRoot = Join-Path $transactionRoot "backup"
          $script:WorkTmp = Join-Path $transactionRoot "work"
          $script:CloneTmp = Join-Path $transactionRoot "clone"
          New-Item -ItemType Directory -Force -Path `
            $script:BackupRoot, $script:WorkTmp, $script:CloneTmp | Out-Null
          try {
            Remove-InstallerTemps -KeepBackup
            if (-not (Test-Path -LiteralPath $script:BackupRoot)) {
              throw "incomplete rollback deleted the previous tool backup"
            }
            if ((Test-Path -LiteralPath $script:WorkTmp) -or
                (Test-Path -LiteralPath $script:CloneTmp)) {
              throw "temporary staging paths were not cleaned"
            }
            Remove-InstallerTemps
            if (Test-Path -LiteralPath $script:BackupRoot) {
              throw "completed rollback did not clean the backup"
            }
          } finally {
            Remove-Item -LiteralPath $transactionRoot -Recurse -Force -ErrorAction SilentlyContinue
          }

          $tester = Get-Content -Raw -LiteralPath "test-install.ps1"
          foreach ($name in @(
            "UV_TOOL_DIR",
            "UV_TOOL_BIN_DIR",
            "UV_INSTALL_DIR",
            "UV_UNMANAGED_INSTALL",
            "UV_PYTHON_INSTALL_DIR",
            "UV_PYTHON_BIN_DIR",
            "UV_PYTHON_CACHE_DIR",
            "UV_CACHE_DIR",
            "UV_NO_MODIFY_PATH",
            "UV_PYTHON_NO_REGISTRY",
            "UV_PYTHON_INSTALL_REGISTRY",
            "TEMP",
            "TMP",
            "XDG_BIN_HOME"
          )) {
            if ([regex]::Matches($tester, [regex]::Escape($name)).Count -lt 3) {
              throw "$name is not isolated in both parent and child"
            }
          }
          foreach ($name in @(
            "MARGINALIA_WHEEL",
            "MARGINALIA_SRC",
            "MARGINALIA_MANIFEST",
            "MARGINALIA_WHEEL_SHA256",
            "MARGINALIA_DEFAULT_WHEEL_URL",
            "MARGINALIA_DEFAULT_MANIFEST_URL",
            "MARGINALIA_REPO",
            "MARGINALIA_REF",
            "MARGINALIA_PACKS",
            "MARGINALIA_ENDPOINT",
            "MARGINALIA_AUTH_TOKEN"
          )) {
            if ([regex]::Matches($tester, [regex]::Escape($name)).Count -lt 2) {
              throw "$name is not scrubbed in both parent and child"
            }
          }
          if (-not $tester.Contains('[Environment]::SetEnvironmentVariable($name, $oldEnv[$name], "Process")')) {
            throw "parent environment restoration is missing"
          }
          $childRunIndex = $tester.IndexOf('& $powershell @childArgs')
          $stopGuardIndex = $tester.IndexOf('if ($Cleanup -or $Profile -eq "release-lifecycle")', $childRunIndex)
          $stopIndex = $tester.IndexOf('Stop-TestDaemon $TestHome', $stopGuardIndex)
          $restoreIndex = $tester.IndexOf('foreach ($name in $envNames)', $stopIndex)
          $exportIndex = $tester.IndexOf('Export-PublicEvidence', $restoreIndex)
          $removeGuardIndex = $tester.IndexOf('if ($Cleanup)', $exportIndex)
          $removeIndex = $tester.IndexOf('Remove-TestSandbox $TestHome', $removeGuardIndex)
          $exitIndex = $tester.LastIndexOf('if ($childExitCode -ne 0)')
          if ($childRunIndex -lt 0 -or $stopGuardIndex -le $childRunIndex -or
              $stopIndex -le $stopGuardIndex -or $restoreIndex -le $stopIndex -or
              $exportIndex -le $restoreIndex -or $removeGuardIndex -le $exportIndex -or
              $removeIndex -le $removeGuardIndex -or $exitIndex -le $removeIndex) {
            throw "sandbox stop, environment restoration, evidence export, removal, and exit propagation are out of order"
          }

          $testerTokens = $null
          $testerErrors = $null
          $testerAst = [System.Management.Automation.Language.Parser]::ParseFile(
            (Join-Path $PWD "test-install.ps1"),
            [ref]$testerTokens,
            [ref]$testerErrors
          )
          if ($testerErrors.Count -gt 0) { throw "test-install.ps1 did not parse" }
          foreach ($functionName in @(
            "Initialize-TestSandbox",
            "Remove-TestSandbox",
            "Export-PublicEvidence"
          )) {
            $functionAst = $testerAst.Find(
              {
                param($node)
                $node -is [System.Management.Automation.Language.FunctionDefinitionAst] -and
                  $node.Name -eq $functionName
              },
              $true
            )
            if ($null -eq $functionAst) { throw "$functionName is missing" }
            . ([scriptblock]::Create($functionAst.Extent.Text))
          }

          $unowned = Join-Path $env:RUNNER_TEMP "marginalia-install-test-unowned"
          New-Item -ItemType Directory -Force -Path $unowned | Out-Null
          try {
            $refused = $false
            try {
              Initialize-TestSandbox $unowned $env:RUNNER_TEMP | Out-Null
            } catch {
              $refused = $_.Exception.Message.Contains("unowned test directory")
            }
            if (-not $refused) { throw "unowned Windows test directory was accepted" }
          } finally {
            Remove-Item -LiteralPath $unowned -Recurse -Force -ErrorAction SilentlyContinue
          }

          $owned = Join-Path $env:RUNNER_TEMP "marginalia-install-test-owned"
          $owned = Initialize-TestSandbox $owned $env:RUNNER_TEMP
          Set-Content -LiteralPath (Join-Path $owned "retained.txt") -Value "test"
          Remove-TestSandbox $owned $env:RUNNER_TEMP
          if (Test-Path -LiteralPath $owned) { throw "owned Windows test sandbox was not removed" }

          $raw = Join-Path $env:RUNNER_TEMP "windows-private.raw.log"
          $public = Join-Path $env:RUNNER_TEMP "windows-public.log"
          $privateRoot = "C:\Users\alice\AppData\Local\Temp\marginalia-install-test-proof"
          @(
            "**********************",
            "Windows PowerShell transcript start",
            "Username: DOMAIN\alice",
            "Machine: TESTHOST",
            "**********************",
            "TEST_HOME=$privateRoot",
            "CALLER=C:\Users\alice",
            "IDENTITY=DOMAIN\alice@TESTHOST",
            "WINDOWS_RELEASE_LIFECYCLE_OK",
            "**********************",
            "Windows PowerShell transcript end",
            "**********************"
          ) | Set-Content -LiteralPath $raw -Encoding UTF8
          try {
            Export-PublicEvidence `
              $raw $public $privateRoot "C:\Users\alice" "DOMAIN\alice" "TESTHOST"
            $sanitized = Get-Content -Raw -LiteralPath $public
            foreach ($required in @(
              "TEST_HOME=<TEST_HOME>",
              "CALLER=<CALLER_HOME>",
              "IDENTITY=<WINDOWS_USER>@<WINDOWS_MACHINE>",
              "WINDOWS_RELEASE_LIFECYCLE_OK"
            )) {
              if (-not $sanitized.Contains($required)) {
                throw "sanitized evidence is missing: $required"
              }
            }
            foreach ($forbidden in @(
              "Windows PowerShell transcript",
              "C:\Users\alice",
              "DOMAIN\alice",
              "TESTHOST"
            )) {
              if ($sanitized.Contains($forbidden)) {
                throw "sanitized evidence retained private field: $forbidden"
              }
            }
          } finally {
            Remove-Item -LiteralPath $raw, $public -Force -ErrorAction SilentlyContinue
          }
